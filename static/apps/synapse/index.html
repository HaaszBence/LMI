<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Synapse</h1>
            <p class="text-gray-600 font-medium">The social backbone for modern platforms.</p>
        </header>

        <!-- Login Notice -->
        <div id="loginNotice" class="bg-orange-50 border border-orange-100 rounded-xl p-6 mb-8 text-center hidden">
            <p class="text-orange-700 font-semibold">You must be logged in to join the conversation.</p>
            <a href="/apps/auth/" class="mt-3 inline-block bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-700 transition">Login / Register</a>
        </div>

        <!-- Post Comment Form -->
        <section id="postSection" class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100 hidden">
            <h2 class="text-lg font-semibold mb-4 text-gray-800">Post a new comment</h2>
            <div class="space-y-4">
                <div class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select User</label>
                    <select id="userSelect" class="w-full rounded-lg border-gray-200 bg-gray-50 p-2.5 text-sm border"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Comment</label>
                    <textarea id="commentContent" rows="3" class="w-full rounded-lg border-gray-200 bg-gray-50 p-2.5 text-sm focus:ring-blue-500 focus:border-blue-500 border" placeholder="What's on your mind?"></textarea>
                </div>
                <button onclick="handlePostComment()" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition duration-200">
                    Post Comment
                </button>
            </div>
        </section>

        <!-- Filter / List -->
        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">Recent Comments</h2>
                <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-500">Filter by user:</span>
                    <select id="filterUser" onchange="refreshComments()" class="rounded-lg border-gray-200 bg-white p-1.5 text-xs border">
                        <option value="">All Users</option>
                    </select>
                </div>
            </div>

            <div id="commentsList" class="space-y-4">
                <div class="text-center py-10 text-gray-400">Loading comments...</div>
            </div>
        </section>
    </div>

    <!-- Modular Scripts -->
    <script src="/static/apps/synapse/js/api.js"></script>
    <script src="/static/apps/synapse/js/app.js"></script>
</body>
</html>
