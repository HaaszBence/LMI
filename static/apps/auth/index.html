<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LetsMakeIt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tighter">LetsMakeIt</h1>
            <p class="text-slate-500 mt-2" id="form-title">Welcome back! Please login.</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div id="name-field" class="hidden">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                <input type="text" id="name" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required minlength="8" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 active:scale-95 transition-all">
                Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <button id="toggle-mode" class="text-orange-600 font-semibold hover:underline">
                Need an account? Register here.
            </button>
        </div>

        <div id="error-msg" class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg hidden"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080' 
            : 'https://api.lets-make-it.hu';

        let isLogin = true;
        const form = document.getElementById('auth-form');
        const nameField = document.getElementById('name-field');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-mode');
        const errorMsg = document.getElementById('error-msg');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            nameField.classList.toggle('hidden');
            formTitle.textContent = isLogin ? 'Welcome back! Please login.' : 'Create your account today.';
            submitBtn.textContent = isLogin ? 'Login' : 'Register';
            toggleBtn.textContent = isLogin ? 'Need an account? Register here.' : 'Already have an account? Login here.';
            errorMsg.classList.add('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                if (isLogin) {
                    // OAuth2 requires form data
                    const formData = new FormData();
                    formData.append('username', email);
                    formData.append('password', password);

                    const res = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.detail || 'Login failed');
                    }

                    const { access_token } = await res.json();
                    localStorage.setItem('lmi_token', access_token);
                    window.location.href = '/';
                } else {
                    const name = document.getElementById('name').value;
                    const res = await fetch(`${API_BASE_URL}/user/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.detail || 'Registration failed');
                    }

                    // After register, auto-login
                    isLogin = true;
                    form.dispatchEvent(new Event('submit'));
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
