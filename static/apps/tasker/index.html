<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasker - Personal Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">Tasker</h1>
            <p class="text-slate-600 font-medium">Your personal, private task manager.</p>
        </header>

        <!-- Auth Guard -->
        <div id="loginNotice" class="bg-emerald-50 border border-emerald-100 rounded-xl p-6 mb-8 text-center hidden">
            <p class="text-emerald-700 font-semibold">Login to see your private tasks.</p>
            <a href="/apps/auth/" class="mt-3 inline-block bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition">Login / Register</a>
        </div>

        <div id="taskerApp" class="hidden">
            <!-- Add Task -->
            <section class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-100">
                <div class="flex gap-4">
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" class="flex-1 rounded-lg border-slate-200 bg-slate-50 p-3 text-sm focus:ring-emerald-500 focus:border-emerald-500 border">
                    <button onclick="addTask()" class="bg-emerald-600 text-white font-semibold px-6 py-2 rounded-lg hover:bg-emerald-700 active:scale-95 transition">Add</button>
                </div>
            </section>

            <!-- Task List -->
            <div id="taskList" class="space-y-3">
                <div class="text-center py-10 text-slate-400">Loading your tasks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080' 
            : 'https://api.lets-make-it.hu';

        async function fetchTasks() {
            const token = localStorage.getItem('lmi_token');
            if (!token) {
                document.getElementById('loginNotice').classList.remove('hidden');
                document.getElementById('taskerApp').classList.add('hidden');
                return;
            }

            document.getElementById('loginNotice').classList.add('hidden');
            document.getElementById('taskerApp').classList.remove('hidden');

            const res = await fetch(`${API_BASE_URL}/task/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                if (res.status === 401) logout();
                return;
            }

            const tasks = await res.json();
            renderTasks(tasks);
        }

        async function addTask() {
            const titleInput = document.getElementById('taskTitle');
            const title = titleInput.value.trim();
            if (!title) return;

            const token = localStorage.getItem('lmi_token');
            const res = await fetch(`${API_BASE_URL}/task/`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ title })
            });

            if (res.ok) {
                titleInput.value = '';
                fetchTasks();
            }
        }

        async function toggleTask(id, completed) {
            const token = localStorage.getItem('lmi_token');
            await fetch(`${API_BASE_URL}/task/${id}`, {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ completed: !completed })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            const token = localStorage.getItem('lmi_token');
            await fetch(`${API_BASE_URL}/task/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            fetchTasks();
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-lg border border-dashed border-slate-200">Your task list is empty.</div>';
                return;
            }

            list.innerHTML = tasks.map(t => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${t.id}, ${t.completed})" class="w-5 h-5 rounded text-emerald-600 focus:ring-emerald-500 cursor-pointer">
                        <span class="${t.completed ? 'line-through text-slate-400' : 'text-slate-800'} font-medium">${t.title}</span>
                    </div>
                    <button onclick="deleteTask(${t.id})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('lmi_token');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', fetchTasks);
    </script>
</body>
</html>
