<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-200 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-bold text-orange-600 tracking-tighter">LetsMakeIt</span>
            <div class="h-10 w-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 font-bold">JD</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-16 px-4">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">My Projects</h1>
            <p class="text-slate-500">Workspace for the LetsMakeIt suite.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Synapse Tile -->
            <a href="/apps/synapse/" class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-orange-300 transition-all duration-300">
                <div class="h-14 w-14 bg-orange-600 rounded-xl flex items-center justify-center mb-6 text-white group-hover:scale-110 transition-transform">
                    <span class="text-2xl">🧠</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Synapse</h2>
                <p class="text-slate-600">The social engine for modular commentary and community building.</p>
            </a>

            <!-- Tasker Tile -->
            <a href="/apps/tasker/" class="group bg-white p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-xl hover:border-emerald-300 transition-all duration-300">
                <div class="h-14 w-14 bg-emerald-500 rounded-xl flex items-center justify-center mb-6 text-white group-hover:scale-110 transition-transform">
                    <span class="text-2xl">✅</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Tasker</h2>
                <p class="text-slate-600">Efficient task management and priority tracking for teams.</p>
            </a>

            <!-- Placeholder Tile -->
            <div class="bg-slate-100 p-8 rounded-2xl border border-dashed border-slate-300 flex flex-col items-center justify-center text-center opacity-60">
                <div class="h-14 w-14 bg-slate-200 rounded-xl flex items-center justify-center mb-6 text-slate-400">
                    <span class="text-2xl">➕</span>
                </div>
                <h2 class="text-xl font-bold text-slate-400">Coming Soon</h2>
                <p class="text-slate-400 text-sm">More apps are being developed.</p>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto py-8 px-4 text-center border-t border-slate-200 mt-12">
        <p class="text-slate-400 text-sm">Built with lots of ❤️ and a caffeine.</p>
    </footer>
</body>
</html>
