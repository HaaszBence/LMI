server {
    listen 80;
    server_name localhost;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Redirect app paths to their respective folders
    location /apps/synapse/ {
        alias /usr/share/nginx/html/apps/synapse/;
        index index.html;
        try_files $uri $uri/ /apps/synapse/index.html;
    }

    location /apps/tasker/ {
        alias /usr/share/nginx/html/apps/tasker/;
        index index.html;
        try_files $uri $uri/ /apps/tasker/index.html;
    }

    # Backend API proxy
    location /user/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /comment/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
