server {
    listen 80;
    server_name localhost;
    # Serve the main portal
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    # Fix for /static/ prefix in HTML files
    location /static/ {
        alias /usr/share/nginx/html/;
    }

    # Serve Synapse app
    location /apps/synapse/ {
        alias /usr/share/nginx/html/apps/synapse/;
        index index.html;
        try_files $uri $uri/ /apps/synapse/index.html;
    }
    # Serve Tasker app
    location /apps/tasker/ {
        alias /usr/share/nginx/html/apps/tasker/;
        index index.html;
        try_files $uri $uri/ /apps/tasker/index.html;
    }
}