services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: lmi_db
      POSTGRES_USER: lmi_user
      POSTGRES_PASSWORD: change_me_in_env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmi_user -d lmi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - SQLALCHEMY_DATABASE_URL=postgresql://lmi_user:change_me_in_env@db/lmi_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    volumes:
      - ./static:/usr/share/nginx/html
      - ./frontend.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
